  <text class="brand" x="160" y="242" text-anchor="middle" font-size="28" font-weight="300" letter-spacing="-0.5" fill="#6c7086">DB Studio</text>
  <text class="brand" x="160" y="318" text-anchor="middle" font-size="12" font-weight="400" letter-spacing="0.6" fill="#585b70">by Kayzzii</text>
