<svg width="250" height="48" viewBox="0 0 250 48" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">LogicVerse DB Studio horizontal logo</title>
  <desc id="desc">Stylized database cylinder with LV monogram and LogicVerse DB Studio wordmark.</desc>
  <style>
    .brand { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  </style>

  <!-- Symbol -->
  <g transform="translate(0 0)">
    <!-- Database cylinder body -->
    <path d="M24 5C34.5 5 43 8.1 43 12V36C43 39.9 34.5 43 24 43C13.5 43 5 39.9 5 36V12C5 8.1 13.5 5 24 5Z" fill="#89b4fa"/>

    <!-- Data rows / cylinder cuts -->
    <path d="M5 20C8.6 23.1 15.5 25 24 25C32.5 25 39.4 23.1 43 20V24C38.8 26.7 32.2 28.4 24 28.4C15.8 28.4 9.2 26.7 5 24V20Z" fill="#1e1e2e" fill-opacity="0.95"/>
    <path d="M5 31C8.6 34.1 15.5 36 24 36C32.5 36 39.4 34.1 43 31V35C38.8 37.7 32.2 39.4 24 39.4C15.8 39.4 9.2 37.7 5 35V31Z" fill="#1e1e2e" fill-opacity="0.95"/>

    <!-- Top ellipse line -->
    <ellipse cx="24" cy="12" rx="19" ry="7" fill="#89b4fa"/>
    <path d="M8 12C8 9.8 15.2 8 24 8C32.8 8 40 9.8 40 12C40 14.2 32.8 16 24 16C15.2 16 8 14.2 8 12Z" fill="#1e1e2e" fill-opacity="0.12"/>

    <!-- LV monogram, simplified for small sizes -->
    <path d="M14 17H19V31H28V36H14V17Z" fill="#1e1e2e" fill-opacity="0.92"/>
    <path d="M25 17H30L33.6 29.2L37.2 17H42L36.2 36H31L25 17Z" fill="#cba6f7"/>
  </g>

  <!-- Wordmark -->
  <text class="brand" x="62" y="31" font-size="20" letter-spacing="-0.35" dominant-baseline="middle">
    <tspan font-weight="600" fill="#cdd6f4">LogicVerse</tspan>
    <tspan dx="5" font-weight="300" fill="#6c7086">DB Studio</tspan>
  </text>
</svg>
